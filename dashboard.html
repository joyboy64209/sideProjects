<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surfers Hub - Dashboard</title>
    <style>
        :root {
            --bg-color: #0b1329;
            --blob-1: #bf5af2;
            --blob-2: #0a84ff;
            --glass-bg: rgba(30, 30, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.6);
            --text-color: #ffffff;
            --label-color: rgba(255, 255, 255, 0.6);
            --btn-bg: #0a84ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            color: var(--text-color); overflow: hidden;
        }

        .ambient-blob {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.45; z-index: 0; pointer-events: none;
        }
        .blob-1 { width: 45vw; height: 45vw; top: -10%; left: -10%; background: var(--blob-1); }
        .blob-2 { width: 40vw; height: 40vw; bottom: -10%; right: -10%; background: var(--blob-2); }

        .dashboard-card {
            position: relative; z-index: 10; width: 100%; max-width: 420px;
            padding: 40px; border-radius: 28px; background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(210%);
            box-shadow: 0 30px 60px -15px var(--glass-shadow), inset 0 2px 3px -1px rgba(255,255,255,0.25);
            border: 1px solid var(--glass-border); text-align: center;
        }

        .profile-avatar {
            width: 90px; height: 90px; background: rgba(255,255,255,0.05);
            border: 2px solid #00ffcc; border-radius: 50%;
            margin: 0 auto 15px; display: flex; justify-content: center; align-items: center;
            font-size: 42px; box-shadow: 0 0 20px rgba(0,255,204,0.2);
        }

        h2 { margin: 0 0 8px 0; font-size: 28px; }
        .rank { color: var(--label-color); font-size: 14px; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; }

        .stats-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 35px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.04); padding: 18px;
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-box span { display: block; font-size: 12px; color: var(--label-color); text-transform: uppercase; margin-bottom: 6px; }
        .stat-box div { font-size: 24px; font-weight: bold; color: #ffcc00; }

        .action-btn {
            width: 100%; padding: 16px; background: var(--btn-bg); border: none;
            border-radius: 14px; color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; display: block; text-decoration: none;
        }
        .action-btn:hover { opacity: 0.95; transform: translateY(-2px); }
        .logout-link { display: inline-block; margin-top: 20px; color: #ff3b30; text-decoration: none; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <div class="dashboard-card">
        <div class="profile-avatar">🏃‍♂️</div>
        <h2 id="username-display">Loading...</h2>
        <div class="rank">Subway Legend</div>

        
        <button type="button" onclick="launchGame(event)" class="action-btn">Launch Game</button>
        <a href="#" onclick="logout(event)" class="logout-link">Log Out Account</a>
    </div>

    <script>
        // Protect Route: Ensure token exists
        const token = localStorage.getItem('surfer_token');
        if (!token) {
            console.warn("No token detected, redirecting back to login.html");
            window.location.href = '/login.html';
        }

        // Load metrics on initialization
        async function loadDashboard() {
            try {
                const response = await fetch('/api/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    document.getElementById('username-display').textContent = data.username;
                    document.getElementById('highscore-display').textContent = Number(data.high_score).toLocaleString();
                } else {
                    console.error("Profile fetch returned error status:", data.error);
                    logout();
                }
            } catch (err) {
                console.error("Failed to fetch profile stats data:", err);
            }
        }

        // FIXED: Added event arg, preventDefault and absolute route path redirection
        function launchGame(event) {
            if (event) event.preventDefault();
            console.log("Redirecting to game.html...");
            window.location.href = '/game.html';
        }

        function logout(event) {
            if (event) event.preventDefault();
            localStorage.clear();
            window.location.href = '/login.html';
        }

        loadDashboard();
    </script>
</body>
</html>
