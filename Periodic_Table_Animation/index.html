<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Anime.js Periodic Table Auto Layout animation</title><link rel="stylesheet" href="style.css">

  </head>
     
  <body>
  <div class="controls">
  <div class="controls-group display br">
    <button class="is-active toggle" id="table">table</button>
    <button class="toggle" id="sphere">sphere</button>
    <button class="toggle" id="helix">helix</button>
    <button class="toggle" id="grid">grid</button>
  </div>
</div>
<div id="scene">
  <div id="scene-content" data-layout="table"></div>
</div>
<div id="file-protocol-warning" style="display:none;text-align:center;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;background:#252423;border:2px solid #ff4b4b;padding:2rem;border-radius:0.5rem;color:#f6f4f2;font-family:'IoskeleyMono',monospace;max-width:500px;">
  <h2 style="color:#ff4b4b;margin-bottom:1rem;">⚠️ Cannot load via file://</h2>
  <p style="margin-bottom:1rem;">This project uses ES module imports and must be served via a local HTTP server.</p>
  <p style="margin-bottom:1rem;">Open a terminal in the project folder and run:</p>
  <code style="display:block;background:#333;padding:0.5rem;border-radius:0.25rem;font-size:1.1rem;">npm start</code>
  <p style="margin-top:1rem;">Then open <strong>http://localhost:3000</strong> in your browser.</p>
</div>
<div class="credits">
  3D transform calculations ported from this three.js <a href="https://threejs.org/examples/css3d_periodictable.html" target="_blank">demo</a>.
</div>
<template id="element">
  <button class="element" data-color="0">
    <div class="element-number"></div>
    <div class="element-symbol"></div>
    <div class="element-title"></div>
    <div class="element-description"></div>
  </button>
</template>
    <script>
      // Detect file:// protocol and show warning
      if (window.location.protocol === 'file:') {
        document.getElementById('file-protocol-warning').style.display = 'block';
      }
    </script>
    <script type="module" src="./script.js"></script>

  </body>
  
</html>
